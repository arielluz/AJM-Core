<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="app.js"></script>
<title>Chucky</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background-color: darkslategrey; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
} 




.card{
    width: 24rem;
    text-align: center;
    border: none;
    border-radius: 18px;
    overflow: hidden;
    background-color: #1f2d2d;
    color: white;
    box-shadow: 0 8px 25px rgba(0,0,0,0.4);
}



.card-img-top{
    height: 320px;
    object-fit: cover;
}

.card:hover .card-img-top{
    transform: scale(1.05);
}

.card-body{
    padding: 1.5rem;
}

.card-text{
    font-size: 1rem;
    line-height: 1.7;
    color: #e6e6e6;
}

.card strong{
    color: #7fb3ff;
}
</style>
</head>

<body>

<section id="descricao-anomalia">
    <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="card">
            <img src="./download(3).gif" class="card-img-top" alt="Chucky">

            <div class="card-body">
                <p class="card-text">
                    Conhecido como <strong>Boneco assasino</strong>,
                    <strong>O Chucky</strong> é uma entidade perigosa.
                    O boneco Chucky possui duas aparências principais ao longo da franquia cinematográfica: 
                    a versão infantil inofensiva ("Good Guy") 
                    e a versão aterrorizante com cicatrizes e feições humanas distorcidas
            </div>
        </div>
    </div>
</section>

<div id="caixa"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
